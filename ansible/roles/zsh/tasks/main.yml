---
# setup_oh_my_zsh + install_oh_my_zsh_plugins + install_powerlevel10k + install_fzf
- name: Install zsh
  ansible.builtin.apt:
    name: zsh
    state: present
  become: true

- name: Install Oh My Zsh (unattended)
  ansible.builtin.shell: >
    sh -c "$(curl -fsSL https://raw.github.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  args:
    creates: "{{ ansible_env.HOME }}/.oh-my-zsh"

- name: Set zsh as the default login shell
  # Replaces the manual `chsh` + password-over-stdin dance. become handles auth.
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    shell: /usr/bin/zsh
  become: true

- name: Install Powerlevel10k theme
  ansible.builtin.git:
    repo: https://github.com/romkatv/powerlevel10k.git
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/themes/powerlevel10k"
    depth: 1
    update: false        # clone-once; don't pull on every run

- name: Install Oh My Zsh plugins
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/{{ item.name }}"
    depth: 1
    update: false
  loop: "{{ omz_plugins }}"
  loop_control:
    label: "{{ item.name }}"

- name: Clone fzf
  ansible.builtin.git:
    repo: https://github.com/junegunn/fzf.git
    dest: "{{ ansible_env.HOME }}/.fzf"
    depth: 1
    update: false

- name: Run the fzf installer
  ansible.builtin.command: "{{ ansible_env.HOME }}/.fzf/install --key-bindings --completion --no-update-rc"
  args:
    creates: "{{ ansible_env.HOME }}/.fzf/bin/fzf"
